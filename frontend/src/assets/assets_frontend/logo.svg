<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Bridge + Medical Cross Icon -->
  <g transform="translate(30,30)">
    <path d="M20 120 Q70 20 120 120" fill="none" stroke="url(#grad)" stroke-width="14" stroke-linecap="round"/>
    <line x1="20" y1="120" x2="20" y2="160" stroke="url(#grad)" stroke-width="14"/>
    <line x1="120" y1="120" x2="120" y2="160" stroke="url(#grad)" stroke-width="14"/>

    <rect x="52" y="25" width="36" height="72" rx="4" fill="url(#grad)"/>
    <rect x="34" y="43" width="72" height="36" rx="4" fill="url(#grad)"/>
  </g>

  <!-- Wordmark -->
  <text x="190" y="125"
        font-family="Arial, Helvetica, sans-serif"
        font-size="72"
        font-weight="700"
        fill="url(#grad)">HealthBridge</text>
</svg>